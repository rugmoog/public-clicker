<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
</head>
<body>
  <h1>Clicker</h1>

  <div>Count: <span id="count">0</span></div>

  <button id="btn">Click me</button>

  <script>
  const API = "https://riptide-fanfare-perfectly.ngrok-free.dev";

  const countEl = document.getElementById("count");
  const btn = document.getElementById("btn");

  async function loadCount() {
    const res = await fetch(`${API}/api/clicks`, { cache: "no-store" });
    const data = await res.json();
    countEl.textContent = data.clicks;
  }

  async function sendClick() {
    const res = await fetch(`${API}/api/click`, {
      method: "POST"
    });

    const data = await res.json();
    countEl.textContent = data.clicks;
  }

  btn.addEventListener("click", sendClick);

  loadCount();
  setInterval(loadCount, 2000);
</script>
</body>
</html>
