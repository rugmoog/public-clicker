<!DOCTYPE html>
<html>
<head>
  <title>Clicker Game</title>
</head>
<body>
  <h1>Clicker</h1>

  <div>Count: <span id="count">0</span></div>

  <button id="btn">Click me</button>
  <button onclick="reset()">reset and sabatage everyone elses hard work</button>

  <script>
  const API = "https://100.91.42.23:5000";

  const countEl = document.getElementById("count");
  const btn = document.getElementById("btn");

  async function loadCount() {
    const res = await fetch(`${API}/api/clicks`, {
  headers: {
    "ngrok-skip-browser-warning": "true"
  }
});
    const data = await res.json();
    countEl.textContent = data.clicks;
  }

  async function sendClick() {
    const res = await fetch(`${API}/api/click`, {
      method: "POST"
    });

    const data = await res.json();
    countEl.textContent = data.clicks;
  }

async function reset() {
    const res = await fetch(`${API}/api/reset`, {
      method: "POST"
    });

    
    countEl.textContent = "0";
  }

    
  btn.addEventListener("click", sendClick);

  loadCount();
  setInterval(loadCount, 2000);
</script>
</body>
</html>
